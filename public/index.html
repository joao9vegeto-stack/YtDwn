<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>YT Downloader</title>

<script src="/socket.io/socket.io.js"></script>

<style>
body{
background:#070707;
font-family:Arial;
color:white;
padding:20px;
}

input,select,button{
width:100%;
padding:16px;
margin-top:12px;
border:none;
border-radius:14px;
font-size:18px;
}

input,select{
background:#151515;
color:white;
}

button{
background:#ff0055;
color:white;
font-weight:bold;
cursor:pointer;
}

.download-item{
background:#111;
padding:20px;
border-radius:24px;
margin-top:20px;
}

.thumb img{
width:100%;
border-radius:18px;
}

.badge{
display:inline-block;
background:#003d1f;
color:#00ff88;
padding:10px 14px;
border-radius:999px;
font-weight:bold;
margin-top:18px;
}

.video-title{
font-size:20px;
font-weight:bold;
margin-top:16px;
}

.status-text{
margin-top:10px;
color:#ddd;
}

.progress-wrap{
height:12px;
background:#222;
border-radius:999px;
overflow:hidden;
margin-top:16px;
}

.progress-bar{
height:100%;
width:0%;
background:#00ff88;
transition:0.3s;
}

.download-actions{
margin-top:20px;
}

.download-link{
display:block;
padding:16px;
background:#00c853;
color:white;
text-decoration:none;
border-radius:14px;
text-align:center;
font-weight:bold;
}
</style>
</head>

<body>

<h1>YT Downloader</h1>

<input
id="url"
placeholder="Cole o link do YouTube"
/>

<select id="quality">
<option value="bestvideo+bestaudio">
1080p H264 • CFR30
</option>
</select>

<button onclick="startDownload()">
Baixar e Converter
</button>

<h2 style="margin-top:40px;">Downloads</h2>

<div id="downloads"></div>

<script>
const socket = io();

const downloads = {};

socket.on("progress", (data) => {

let item = downloads[data.id];

if (!item) {
item = createDownloadCard(data);
downloads[data.id] = item;
}

updateCard(item, data);

});

async function startDownload() {

const url = document.getElementById("url").value.trim();

const quality = document.getElementById("quality").value;

if (!url) {
alert("Cole uma URL");
return;
}

socket.emit("start-download", {
url,
quality
});

}

function createDownloadCard(data) {

const container = document.createElement("div");

container.className = "download-item";

container.innerHTML = `
<div class="thumb">
<img src="${data.thumbnail || ""}">
</div>

<div class="badge">
H264
</div>

<div class="video-title">
${data.title || "Processando vídeo"}
</div>

<div class="status-text"></div>

<div class="progress-wrap">
<div class="progress-bar"></div>
</div>

<div class="download-actions"></div>
`;

document.getElementById("downloads").prepend(container);

return container;
}

function updateCard(card, data) {

const status = card.querySelector(".status-text");

const bar = card.querySelector(".progress-bar");

const actions = card.querySelector(".download-actions");

if (data.thumbnail) {
card.querySelector("img").src = data.thumbnail;
}

if (data.title) {
card.querySelector(".video-title").innerText = data.title;
}

status.innerText = data.message || "";

if (typeof data.progress !== "undefined") {
bar.style.width = `${data.progress}%`;
}

if (data.stage === "finished") {

actions.innerHTML = `
<a
class="download-link"
href="${data.download}"
download
>
Baixar MP4
</a>
`;

status.innerText = "Download concluído";
bar.style.width = "100%";
}

if (data.stage === "error") {
bar.style.width = "0%";
}
}
</script>

</body>
</html>
