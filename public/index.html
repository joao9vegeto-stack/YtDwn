<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Downloader</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/style.css">

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

<div class="bg-glow"></div>

<div class="app">

  <div class="topbar">
    <div class="logo-wrap">
      <div class="logo">▶</div>

      <div>
        <h1>YT Downloader</h1>
        <p>
          Conversão otimizada para Adobe After Effects.<br>
          MP4 H264 + AAC com máxima compatibilidade.
        </p>
      </div>
    </div>
  </div>

  <div class="hero-card">

    <div class="input-group">

      <input
        id="url"
        placeholder="Cole o link do YouTube"
      >

      <select id="quality">
        <option value="1080">1080p H264 • CFR30</option>
        <option value="720">720p H264 • CFR30</option>
        <option value="480">480p H264 • CFR30</option>
      </select>

      <button class="search-btn" onclick="startDownload()">
        Baixar e Converter
      </button>

    </div>

  </div>

  <div class="downloads-header">

    <h2 class="downloads-title">
      Downloads
    </h2>

    <button onclick="clearDownloads()" class="clear-btn">
      Limpar
    </button>

  </div>

  <div id="downloads"></div>

</div>

<script>
const socket = io();

let downloads = {};

const downloadButton = document.querySelector(".search-btn");

function setButtonState(isLoading, label) {
  if (!downloadButton) return;
  downloadButton.disabled = isLoading;
  downloadButton.textContent = label || (isLoading ? "Processando..." : "Baixar e Converter");
}

function clearDownloads() {
  document.getElementById("downloads").innerHTML = "";
  downloads = {};
}

socket.on("progress", (data) => {
  console.log("PROGRESS:", data);

  let item = downloads[data.id];

  if (!item) {
    item = createDownloadCard(data);
    downloads[data.id] = item;
  }

  updateCard(item, data);

  if (data.stage === "finished" || data.stage === "error") {
    setButtonState(false, "Baixar e Converter");
  }
});

async function startDownload() {
  const url = document.getElementById("url").value.trim();
  const quality = document.getElementById("quality").value;

  if (!url) {
    alert("Cole um link");
    return;
  }

  if (downloadButton && downloadButton.disabled) {
    return;
  }

  const clientId = "job_" + Date.now();

  const card = createDownloadCard({
    id: clientId,
    title: "Preparando download...",
    thumbnail: ""
  });

  downloads[clientId] = card;

  updateCard(card, {
    stage: "starting",
    percent: 0,
    speed: "Conectando...",
    eta: "--"
  });

  setButtonState(true, "Processando...");

  try {
    const req = await fetch("/api/download", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        url,
        quality,
        clientId
      })
    });

    const data = await req.json();

    console.log("API:", data);

    if (!req.ok || data.error) {
      updateCard(card, {
        stage: "error",
        message: data.error || "Erro ao iniciar download"
      });
      setButtonState(false, "Baixar e Converter");
      return;
    }
  } catch (err) {
    console.error(err);

    updateCard(card, {
      stage: "error",
      message: "Erro ao iniciar download"
    });

    setButtonState(false, "Baixar e Converter");
  }
}

function createDownloadCard(data) {
  const container = document.createElement("div");
  container.className = "download-item";

  container.innerHTML = `
<div class="thumb">
  <img src="${data.thumbnail || ""}" alt="">
</div>

<div class="download-content">

  <div class="badge">
    H264
  </div>

  <div class="video-title">
    ${data.title || "Processando vídeo"}
  </div>

  <div class="status-text"></div>

  <div class="progress-wrap">
    <div class="progress-bar"></div>
  </div>

  <div class="download-actions"></div>

</div>
`;

  document.getElementById("downloads").prepend(container);

  return container;
}

function updateCard(card, data) {
  const status = card.querySelector(".status-text");
  const bar = card.querySelector(".progress-bar");
  const actions = card.querySelector(".download-actions");

  if (data.thumbnail) {
    const img = card.querySelector("img");
    img.src = data.thumbnail;
  }

  if (data.title) {
    card.querySelector(".video-title").innerText = data.title;
  }

  if (data.stage === "starting") {
    status.innerHTML = `
      Preparando download...<br>
      ${data.speed || "Conectando..."} • ETA ${data.eta || "--"}
    `;
    bar.style.width = "0%";
  }

  if (data.stage === "downloading") {
    status.innerHTML = `
      Baixando... ${data.percent || 0}%<br>
      ${data.speed || "0MiB/s"} • ETA ${data.eta || "--"}
    `;
    bar.style.width = (data.percent || 0) + "%";
  }

  if (data.stage === "merging") {
    status.innerHTML = `
      Mesclando formatos...<br>
      Finalizando o MP4
    `;
    bar.style.width = "100%";
  }

  if (data.stage === "converting") {
    status.innerHTML = `
      Convertendo para MP4 H264/AAC...<br>
      ${data.percent || 0}% concluído
    `;
    bar.style.width = (data.percent || 0) + "%";
  }

  if (data.stage === "finished") {
    status.innerHTML = `
      <span class="done">
        Conversão finalizada com sucesso
      </span>
    `;

    bar.style.width = "100%";

    actions.innerHTML = `
      <button class="download-btn" type="button">
        Baixar MP4
      </button>
    `;

    actions.querySelector("button").onclick = () => {
      const a = document.createElement("a");
      a.href = data.download;
      a.download = "";
      a.target = "_self";
      document.body.appendChild(a);
      a.click();
      a.remove();
    };
  }

  if (data.stage === "error") {
    status.innerHTML = `
      <span class="error">
        ${data.message}
      </span>
    `;
  }
}
</script>

</body>
</html>
