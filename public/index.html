<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script defer src="/app.js"></script>
</head>
<body>
  <div class="bg-glow"></div>

  <main class="app">
    <header class="topbar">
      <div class="logo-wrap">
        <div class="logo">▶</div>
        <div>
          <h1>YT Downloader</h1>
          <p>Conversão rápida para uso geral.<br>MP4 H264 + AAC com foco em velocidade.</p>
        </div>
      </div>
    </header>

    <section class="hero-card">
      <div class="input-group">
        <input id="url" placeholder="Cole o link do YouTube" autocomplete="off" autocapitalize="none" spellcheck="false">

        <select id="quality">
          <option value="1080">1080p H264 + AAC</option>
          <option value="720">720p H264 + AAC</option>
          <option value="480">480p H264 + AAC</option>
        </select>

        <button class="search-btn" id="start-btn" type="button">Baixar e Converter</button>
      </div>
    </section>

    <div class="downloads-header">
      <h2 class="downloads-title">Downloads</h2>
      <button id="clear-history" class="clear-btn" type="button">Limpar</button>
    </div>

    <section id="downloads"></section>
  </main>

  <div class="report-modal" id="report-modal" hidden>
    <div class="report-backdrop" data-close-report></div>
    <div class="report-panel" role="dialog" aria-modal="true" aria-labelledby="report-title">
      <div class="report-header">
        <div>
          <h3 id="report-title">Relatório MP4</h3>
          <p id="report-subtitle">Especificações do arquivo final</p>
        </div>
        <button class="report-close" type="button" data-close-report aria-label="Fechar relatório">×</button>
      </div>

      <div id="report-body" class="report-body">
        <div class="report-loading">Selecione um arquivo concluído para ver as especificações.</div>
      </div>
    </div>
  </div>
</body>
</html>
