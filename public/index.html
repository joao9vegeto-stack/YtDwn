<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="app">
    <header class="topbar">
      <div class="logo-wrap">
        <div class="logo">▶</div>
        <div>
          <h1>YT Downloader</h1>
          <p>MP4 H264 + AAC com foco em velocidade e compatibilidade.</p>
        </div>
      </div>
    </header>

    <section class="hero-card">
      <div class="input-group">
        <input id="url" placeholder="Cole o link do YouTube" autocomplete="off" autocapitalize="none" spellcheck="false" />
        <select id="quality">
          <option value="1080">1080p H264 + AAC</option>
          <option value="720">720p H264 + AAC</option>
          <option value="480">480p H264 + AAC</option>
        </select>
        <button class="search-btn" id="startBtn">Baixar e Converter</button>
      </div>
    </section>

    <div class="downloads-header">
      <h2 class="downloads-title">Downloads</h2>
      <button id="clear-history" class="clear-btn">Limpar</button>
    </div>

    <div id="downloads"></div>
  </div>

  <div id="report-modal" class="modal hidden">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-card">
      <button class="modal-close" data-close-modal>×</button>
      <h3 id="report-title">Relatório do MP4</h3>
      <pre id="report-body">Carregando...</pre>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
