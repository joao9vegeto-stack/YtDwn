<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Downloader</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="bg-glow"></div>

  <div class="app">
    <header class="topbar">
      <div class="logo-wrap">
        <div class="logo">▶</div>
        <div>
          <h1>YT Downloader</h1>
          <p>
            Conversão rápida para uso geral.<br />
            MP4 H264 + AAC com foco em velocidade.
          </p>
        </div>
      </div>
    </header>

    <section class="hero-card">
      <div class="input-group">
        <input
          id="url"
          placeholder="Cole o link do YouTube"
          autocomplete="off"
          autocapitalize="none"
          spellcheck="false"
        />

        <select id="quality">
          <option value="1080">1080p H264 + AAC</option>
          <option value="720">720p H264 + AAC</option>
          <option value="480">480p H264 + AAC</option>
        </select>

        <button id="startBtn" class="search-btn" type="button">
          Baixar e Converter
        </button>
      </div>
    </section>

    <div class="downloads-header">
      <h2 class="downloads-title">Downloads</h2>
      <button id="clearBtn" class="clear-btn" type="button">Limpar</button>
    </div>

    <div id="downloads"></div>
  </div>

  <div id="reportModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="reportTitle">
      <div class="modal-header">
        <h3 id="reportTitle">Relatório do MP4</h3>
        <button id="closeReportBtn" class="modal-close" type="button">×</button>
      </div>
      <div id="reportContent" class="report-content"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
